<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe Global</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-animation"></div>
    
    <div class="container">
        <!-- Login Screen -->
        <div id="login-screen" class="screen active">
            <div class="glass-panel">
                <h1>Tic Tac Toe</h1>
                <p>Play globally against anyone.</p>
                <input type="text" id="username-input" placeholder="Enter your username" autocomplete="off" />
                <input type="hidden" id="server-ip" value="tictactoe-online-vx1d.onrender.com" />
                <button id="connect-btn" class="glow-btn">Find Match</button>
                
                <div style="margin: 20px 0; color: rgba(255,255,255,0.5); font-size: 0.9em; text-align: center;">— OR —</div>
                
                <button id="create-room-btn" class="glow-btn" style="background: #3b82f6; margin-bottom: 15px;">Create Room</button>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <input type="text" id="room-code-input" placeholder="Room Code" style="margin-bottom: 0; text-transform: uppercase;" />
                    <button id="join-room-btn" class="glow-btn" style="background: #10b981; margin-bottom: 0;">Join</button>
                </div>
            </div>
        </div>

        <!-- Waiting Screen -->
        <div id="waiting-screen" class="screen">
            <div class="glass-panel">
                <div class="loader"></div>
                <h2 id="waiting-title">Searching for opponent...</h2>
                <div id="queue-timer" style="font-size: 24px; font-weight: bold; color: #3b82f6; margin: 10px 0;">00:00</div>
                <p id="waiting-subtitle">Please wait while we find a match.</p>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="screen">
            <div class="glass-panel game-panel">
                <div class="scoreboard">
                    <div class="player player1">
                        <span id="p1-name">You</span>
                        <span id="p1-symbol">(O)</span>
                        <div class="score" id="p1-score">0</div>
                    </div>
                    <div class="vs">VS</div>
                    <div class="player player2">
                        <span id="p2-name">Opponent</span>
                        <span id="p2-symbol">(X)</span>
                        <div class="score" id="p2-score">0</div>
                    </div>
                </div>

                <div id="turn-indicator" class="turn-indicator">Your Turn!</div>

                <div class="tic-tac-grid" id="grid">
                    <button class="cell" data-index="0"></button>
                    <button class="cell" data-index="1"></button>
                    <button class="cell" data-index="2"></button>
                    <button class="cell" data-index="3"></button>
                    <button class="cell" data-index="4"></button>
                    <button class="cell" data-index="5"></button>
                    <button class="cell" data-index="6"></button>
                    <button class="cell" data-index="7"></button>
                    <button class="cell" data-index="8"></button>
                </div>
                
                <div class="controls" style="display: flex; gap: 10px; justify-content: center; margin-top: 15px;">
                    <button id="play-again-btn" class="glow-btn hidden" style="flex: 1; font-size: 14px;">Play Again</button>
                    <button id="go-home-btn" class="glow-btn hidden" style="flex: 1; background: #ef4444; font-size: 14px;">Go Home</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast"></div>

    <script src="script.js"></script>
</body>
</html>
